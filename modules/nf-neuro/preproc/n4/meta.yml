# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: preproc_n4
description: Bias field correction using N4
keywords:
  - correction
  - N4
  - bias field
tools:
  - scilpy:
      description: The Sherbrooke Connectivity Imaging Lab (SCIL) Python dMRI processing toolbox.
      homepage: https://github.com/scilus/scilpy.git
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test', single_end:false ]`

    - image:
        type: file
        description: Nifti image file to correct
        pattern: "*.{nii,nii.gz}"

    - ref:
        type: file
        description: Nifti image file for the reference
        pattern: "*.{nii,nii.gz}"

    - ref_mask:
        type: file
        description: Nifti image file mask for the reference
        pattern: "*.{nii,nii.gz}"

output:
  - image:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*__image_n4.nii.gz":
          type: file
          description: N4 corrected image
          pattern: "*__image_n4.{nii,nii.gz}"
  - versions:
      - versions.yml:
          type: file
          description: File containing software versions
          pattern: versions.yml
authors:
  - "@arnaudbore"
