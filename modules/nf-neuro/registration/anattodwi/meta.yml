---
# yaml-language-server: $schema=https://raw.githubusercontent.com/scilus/nf-neuro/main/modules/meta-schema.json
name: "registration_anattodwi"
description: Anatomical image registration on a diffusion image.
keywords:
  - nifti
  - registration
  - anatomical
  - dwi
tools:
  - ANTs:
      description: "Advanced Normalization Tools."
      homepage: "https://github.com/ANTsX/ANTs"
      documentation: "http://stnava.github.io/ANTsDoc/"
      doi: "10.1038/s41598-021-87564-6"
  - ImageMagick:
      description: "ImageMagick is a software suite to create, edit, compose, or convert bitmap images."
      homepage: "https://imagemagick.org/"
      documentation: "https://imagemagick.org/script/command-line-processing.php"
  - MRtrix3:
      description: "MRtrix3 is a software package for processing diffusion MRI data."
      homepage: "https://www.mrtrix3.org/"
      documentation: "https://mrtrix.readthedocs.io/en/latest/"
      doi: "10.1016/j.neuroimage.2019.116137"
  - Scilpy:
      description: "Scilpy is a Python library for processing diffusion MRI data."
      homepage: "https://github.com/scilus/scilpy"
      documentation: "https://scilpy.readthedocs.io/en/latest/"
args:
  - run_qc:
      type: boolean
      description: "Run quality control for the registration process"
      default: false
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'test', single_end:false ]`
  - fixed_reference:
      type: file
      description: Nifti image file - fixed DWI reference (usually b0)
      pattern: "*.{nii,nii.gz}"
      mandatory: true
  - moving_anat:
      type: file
      description: Nifti image file - moving anat to register (usually T1w)
      pattern: "*.{nii,nii.gz}"
      mandatory: true
  - metric:
      type: file
      description: Nifti image file - additional fixed metric (usually FA)
      pattern: "*.{nii,nii.gz}"
      mandatory: true
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'test', single_end:false ]`
  - anat_warped:
      type: file
      description: Anatomical image warped to DWI space
      pattern: "*_warped.{nii,nii.gz}"
  - affine:
      type: file
      description: Affine transformation matrix file.
      pattern: "*__forward1_affine.mat"
  - warp:
      type: file
      description: Deformation field file.
      pattern: "*__forward0_warp.nii.gz"
  - inverse_warp:
      type: file
      description: Inverse deformation field file.
      pattern: "*__backward1_warp.nii.gz"
  - inverse_affine:
      type: file
      description: Inverse affine transformation matrix file.
      pattern: "*__backward0_affine.mat"
  - image_transform:
      type: list
      description: |
        Tuple, Transformation files to warp images to fixed space, in the correct order
        for REGISTRATION_ANTSAPPLYTRANSFORMS : [ meta, [ warp, affine ] ].
      pattern: "*__forward*.{nii,nii.gz,mat}"
  - inverse_image_transform:
      type: list
      description: |
        Tuple, Transformation files to warp images to moving space, in the correct order for
        REGISTRATION_ANTSAPPLYTRANSFORMS : [ meta, [ inverse_affine, inverse_warp ] ].
      pattern: "*__backward*.{nii,nii.gz,mat}"
  - tractogram_transform:
      type: list
      description: |
        Tuple, Transformation files to warp tractograms to fixed space, in the correct order
        for REGISTRATION_TRANSFORMTRACTOGRAM : [ meta, [ inverse_affine, inverse_warp ] ].
      pattern: "*__backward*.{nii,nii.gz,mat}"
  - inverse_tractogram_transform:
      type: list
      description: |
        Tuple, Transformation files to warp tractograms to moving space, in the correct order
        for REGISTRATION_TRANSFORMTRACTOGRAM : [ meta, [ warp, affine ] ].
      pattern: "*__forward*.{nii,nii.gz,mat}"
  - mqc:
      type: file
      description: .gif file containing quality control image for the registration process. Made for use in MultiQC report.
      pattern: "*_registration_anattodwi_mqc.gif"
      optional: true
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@medde"
  - "@AlexVCaron"
